<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Tracker - Gabox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = window.Recharts;

        // Componentes de Iconos corregidos para Babel Standalone
        const IconBase = ({ children, className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
        );
        const Activity = ({className}) => <IconBase className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconBase>;
        const PlusCircle = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></IconBase>;
        const ListIcon = ({className}) => <IconBase className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></IconBase>;
        const TrendingDown = ({className}) => <IconBase className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></IconBase>;
        const Trash2 = ({className}) => <IconBase className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const Download = ({className}) => <IconBase className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
        const Upload = ({className}) => <IconBase className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const CheckCircle = ({className}) => <IconBase className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const Pencil = ({className}) => <IconBase className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const AlertCircle = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>;
        const Sun = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></IconBase>;

        const STYLES = ['Crol', 'Espalda', 'Pecho', 'Mariposa'];
        const DISTANCES = [25, 50, 100, 200, 400, 800, 1500];
        const COLORS = ['#2563eb', '#16a34a', '#dc2626', '#ca8a04', '#9333ea', '#0891b2', '#ea580c', '#be123c', '#1d4ed8', '#047857'];

        const generateId = () => Math.random().toString(36).substring(2, 15);

        function parseTimeToSeconds(timeStr) {
            try {
                const [minSec, centi] = timeStr.split('.');
                const [min, sec] = minSec.split(':');
                return parseInt(min, 10) * 60 + parseInt(sec, 10) + (parseInt(centi || '0', 10) / 100);
            } catch (e) { return 0; }
        }

        function formatTimeFromSeconds(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.floor(totalSeconds % 60);
            const centis = Math.round((totalSeconds - Math.floor(totalSeconds)) * 100);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${centis.toString().padStart(2, '0')}`;
        }

        function App() {
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem('swimRecords');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('add');
            const [editingId, setEditingId] = useState(null);
            const [swimmerName, setSwimmerName] = useState('Gabox');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [style, setStyle] = useState('Crol');
            const [distance, setDistance] = useState(50);
            const [poolType, setPoolType] = useState('Corta');
            const [timeMin, setTimeMin] = useState('');
            const [timeSec, setTimeSec] = useState('');
            const [timeCen, setTimeCen] = useState('');

            const [chartStyle, setChartStyle] = useState('Crol');
            const [chartDistance, setChartDistance] = useState(50);
            const [chartPoolType, setChartPoolType] = useState('Todas');
            const [historySwimmer, setHistorySwimmer] = useState('Todos');
            const [historyPoolType, setHistoryPoolType] = useState('Todas');

            const [importMessage, setImportMessage] = useState('');
            const [errorMessage, setErrorMessage] = useState('');
            const [recordToDelete, setRecordToDelete] = useState(null);
            const [sunMode, setSunMode] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { localStorage.setItem('swimRecords', JSON.stringify(records)); }, [records]);

            const uniqueSwimmers = useMemo(() => Array.from(new Set(records.map(r => r.swimmerName || 'Desconocido'))).sort(), [records]);

            const handleAddRecord = (e) => {
                e.preventDefault();
                const timeStr = `${timeMin.padStart(2,'0')}:${timeSec.padStart(2,'0')}.${timeCen.padStart(2,'0')}`;
                const timeInSeconds = parseTimeToSeconds(timeStr);
                if (timeInSeconds === 0) { setErrorMessage('Tiempo inválido'); return; }

                const recordData = { id: editingId || generateId(), swimmerName, date, style, distance, poolType, time: timeStr, timeInSeconds };
                setRecords(prev => editingId ? prev.map(r => r.id === editingId ? recordData : r) : [...prev, recordData]);
                setEditingId(null); setTimeMin(''); setTimeSec(''); setTimeCen(''); setActiveTab('history');
            };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(records)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'swim_records.json'; a.click();
            };

            // Lógica de filtrado de gráfica
            const { chartData, chartSwimmers } = useMemo(() => {
                let filtered = records.filter(r => 
                    (chartStyle === 'Todos' || r.style === chartStyle) && 
                    (chartDistance === 'Todos' || r.distance === chartDistance) &&
                    (chartPoolType === 'Todas' || r.poolType === chartPoolType)
                );
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
                const swimmers = Array.from(new Set(filtered.map(r => r.swimmerName)));
                const dataByDate = {};
                filtered.forEach(r => {
                    if(!dataByDate[r.date]) dataByDate[r.date] = { date: r.date };
                    dataByDate[r.date][r.swimmerName] = r.timeInSeconds;
                });
                return { chartData: Object.values(dataByDate), chartSwimmers: swimmers };
            }, [records, chartStyle, chartDistance, chartPoolType]);

            return (
                <div className={`min-h-screen pb-20 transition-all ${sunMode ? 'bg-white text-black' : 'bg-gray-50 text-gray-900'}`}>
                    <header className={`p-4 shadow-md sticky top-0 z-10 ${sunMode ? 'bg-white border-b-4 border-black' : 'bg-blue-600 text-white'}`}>
                        <div className="max-w-3xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2"><Activity className="w-6 h-6" /><h1 className="text-xl font-bold">Swim Tracker</h1></div>
                            <button onClick={() => setSunMode(!sunMode)} className="bg-black/20 px-3 py-1 rounded-full text-sm flex items-center gap-1">
                                <Sun className="w-4 h-4" /> {sunMode ? 'Normal' : 'Modo Sol'}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4">
                        {/* TABS NAVEGACIÓN */}
                        <div className="flex bg-white rounded-xl shadow-sm mb-6 p-1 border border-gray-100">
                            <button onClick={() => setActiveTab('add')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${activeTab === 'add' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>Registro</button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${activeTab === 'history' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>Historial</button>
                            <button onClick={() => setActiveTab('chart')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${activeTab === 'chart' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>Gráfica</button>
                        </div>

                        <div className={`p-6 rounded-2xl shadow-sm border ${sunMode ? 'border-black border-4' : 'bg-white border-gray-100'}`}>
                            {activeTab === 'add' && (
                                <form onSubmit={handleAddRecord} className="space-y-4">
                                    <input type="text" value={swimmerName} onChange={e => setSwimmerName(e.target.value)} placeholder="Nadador" className="w-full p-3 border rounded-xl outline-none" />
                                    <div className="flex gap-2">
                                        <select value={style} onChange={e => setStyle(e.target.value)} className="flex-1 p-3 border rounded-xl outline-none">{STYLES.map(s => <option key={s}>{s}</option>)}</select>
                                        <select value={distance} onChange={e => setDistance(Number(e.target.value))} className="flex-1 p-3 border rounded-xl outline-none">{DISTANCES.map(d => <option key={d} value={d}>{d}m</option>)}</select>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <input type="number" placeholder="Min" value={timeMin} onChange={e => setTimeMin(e.target.value)} className="w-full p-3 border rounded-xl text-center text-2xl font-bold" />
                                        <span className="font-bold">:</span>
                                        <input type="number" placeholder="Seg" value={timeSec} onChange={e => setTimeSec(e.target.value)} className="w-full p-3 border rounded-xl text-center text-2xl font-bold" />
                                        <span className="font-bold">.</span>
                                        <input type="number" placeholder="Cen" value={timeCen
