<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natación: Gabriel y Rafael</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #0056b3; --fondo: #f0f4f8; }
        body { font-family: sans-serif; background: var(--fondo); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h1 { color: var(--azul); font-size: 1.5rem; text-align: center; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.secundario { background: #6c757d; margin-top: 10px; }
        .tabla-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #eee; }
        .modo-sol { background: white !important; color: black !important; border: 4px solid black !important; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏊‍♂️ Tiempos de Natación</h1>
    
    <label>Hijo:</label>
    <select id="hijo">
        <option value="Gabriel">Gabriel</option>
        <option value="Rafael Ignacio">Rafael Ignacio</option>
    </select>

    <label>Estilo:</label>
    <select id="estilo">
        <option>Crol</option>
        <option>Espalda</option>
        <option>Pecho</option>
        <option>Mariposa</option>
    </select>

    <label>Tiempo (MM:SS.cc):</label>
    <input type="text" id="tiempo" placeholder="Ej: 00:45.20">

    <button onclick="guardarTiempo()">Guardar Progreso</button>
</div>

<div class="card">
    <canvas id="grafica"></canvas>
</div>

<div class="card">
    <h3>Historial</h3>
    <div class="tabla-container">
        <table id="tablaTiempos">
            <thead>
                <tr>
                    <th>Hijo</th>
                    <th>Estilo</th>
                    <th>Tiempo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="secundario" onclick="exportarDatos()">Exportar Respaldo (JSON)</button>
    <input type="file" id="importarFile" style="display:none" onchange="importarDatos(this)">
    <button class="secundario" onclick="document.getElementById('importarFile').click()">Importar Respaldo</button>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('natacion_data')) || { Gabriel: [], "Rafael Ignacio": [] };
    let chart;

    function guardarTiempo() {
        const hijo = document.getElementById('hijo').value;
        const estilo = document.getElementById('estilo').value;
        const tiempo = document.getElementById('tiempo').value;

        if(!tiempo) return alert("Pon un tiempo");

        datos[hijo].push({ estilo, tiempo, fecha: new Date().toLocaleDateString() });
        localStorage.setItem('natacion_data', JSON.stringify(datos));
        
        document.getElementById('tiempo').value = "";
        renderizarTodo();
    }

    function renderizarTodo() {
        // Actualizar Tabla
        const tbody = document.querySelector('#tablaTiempos tbody');
        tbody.innerHTML = "";
        [...datos.Gabriel, ...datos["Rafael Ignacio"]].reverse().forEach(t => {
            tbody.innerHTML += `<tr><td>${t.hijo || 'N/A'}</td><td>${t.estilo}</td><td>${t.tiempo}</td></tr>`;
        });

        // Actualizar Gráfica (Simple)
        const ctx = document.getElementById('grafica').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: datos.Gabriel.map(d => d.fecha),
                datasets: [{ label: 'Tiempos Gabriel', data: datos.Gabriel.map(d => parseFloat(d.tiempo.replace(':','.'))), borderColor: 'blue' }]
            }
        });
    }

    function exportarDatos() {
        const blob = new Blob([JSON.stringify(datos)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'respaldo_natacion.json';
        a.click();
    }

    function importarDatos(input) {
        const reader = new FileReader();
        reader.onload = function() {
            datos = JSON.parse(reader.result);
            localStorage.setItem('natacion_data', JSON.stringify(datos));
            renderizarTodo();
        };
        reader.readAsText(input.files[0]);
    }

    renderizarTodo();
</script>

</body>
</html>
