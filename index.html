<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Tracker - Gabox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .sun-mode { background-color: white !important; color: black !important; border: 4px solid black !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20 transition-colors duration-300" id="body">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50 transition-colors" id="header">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏊‍♂️</span>
                <h1 class="text-xl font-bold">Swim Tracker</h1>
            </div>
            <button onclick="toggleSunMode()" class="bg-blue-700 px-4 py-1 rounded-full text-sm font-bold flex items-center gap-1 hover:bg-blue-800">
                ☀️ Modo Sol
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 space-y-6">
        
        <div class="flex bg-white rounded-xl shadow-sm p-1 border border-gray-100 sticky top-20 z-40">
            <button onclick="showTab('add')" id="btn-add" class="flex-1 py-2 rounded-lg text-sm tab-active">Registro</button>
            <button onclick="showTab('history')" id="btn-history" class="flex-1 py-2 rounded-lg text-sm text-gray-500">Historial</button>
            <button onclick="showTab('chart')" id="btn-chart" class="flex-1 py-2 rounded-lg text-sm text-gray-500">Progreso</button>
        </div>

        <section id="tab-add" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <h2 class="text-lg font-bold text-gray-800">Registrar Tiempo</h2>
            <div class="space-y-4">
                <input type="text" id="swimmer" placeholder="Nombre (Ej. Gabox)" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-lg" value="Gabox">
                
                <div class="flex gap-2">
                    <select id="style" class="flex-1 p-3 border rounded-xl outline-none bg-white">
                        <option>Crol</option><option>Espalda</option><option>Pecho</option><option>Mariposa</option>
                    </select>
                    <select id="distance" class="flex-1 p-3 border rounded-xl outline-none bg-white">
                        <option value="25">25m</option><option value="50" selected>50m</option><option value="100">100m</option>
                    </select>
                </div>

                <div class="grid grid-cols-3 gap-2 items-center">
                    <input type="number" id="min" placeholder="MM" class="p-4 border rounded-xl text-center text-3xl font-black focus:ring-2 focus:ring-blue-500">
                    <input type="number" id="sec" placeholder="SS" class="p-4 border rounded-xl text-center text-3xl font-black focus:ring-2 focus:ring-blue-500">
                    <input type="number" id="cen" placeholder="cc" class="p-4 border rounded-xl text-center text-3xl font-black focus:ring-2 focus:ring-blue-500">
                </div>

                <button onclick="saveRecord()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg text-xl">
                    GUARDAR PROGRESO
                </button>
            </div>
        </section>

        <section id="tab-history" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">Historial</h2>
                <button onclick="exportData()" class="text-blue-600 font-bold text-sm">Exportar JSON</button>
            </div>
            <div id="history-list" class="space-y-3">
                </div>
        </section>

        <section id="tab-chart" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Gráfica de Mejora</h2>
            <canvas id="myChart" style="max-height: 300px;"></canvas>
            <p class="text-center text-xs text-gray-400 mt-4">La línea debe bajar para indicar mejora.</p>
        </section>

    </main>

        let chart = null;

        function showTab(tabName) {
            ['add', 'history', 'chart'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active');
                document.getElementById(`btn-${t}`).classList.add('text-gray-500');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add('tab-active');

            if(tabName === 'chart') renderChart();
        }
